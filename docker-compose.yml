version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: relevo
      POSTGRES_USER: relevo
      POSTGRES_PASSWORD: relevo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relevo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://relevo:relevo@db:5432/relevo}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      REQUEST_COST_PER_1K_TOKENS: ${REQUEST_COST_PER_1K_TOKENS:-0.002}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
      VIP_PLAN_LIMIT: ${VIP_PLAN_LIMIT:-10000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
